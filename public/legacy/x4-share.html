<script id="x4-theme-preflight">
(function(){
  try{
    const p = new URLSearchParams(location.search);
    const hash = String(location.hash || '');
    const hashTheme = (hash.match(/[?&]theme=(day|night)\b/) || [])[1];
    const mode = p.get('theme') || hashTheme || localStorage.getItem('x4-dashboard-theme-mode');
    const dayMode = mode === 'day';
    document.documentElement.classList.add('x4-preflight-lock');
    document.documentElement.style.backgroundColor = dayMode ? '#eae8e3' : '#050b10';
    const lockStyle = document.createElement('style');
    lockStyle.id = 'x4-preflight-lock-style';
    lockStyle.textContent = 'html.x4-preflight-lock,html.x4-preflight-lock body{background:' + (dayMode ? '#eae8e3' : '#050b10') + '!important}html.x4-preflight-lock body{visibility:hidden!important}';
    document.head.appendChild(lockStyle);
    if(dayMode){
      document.documentElement.dataset.theme = 'day';
      document.documentElement.classList.add('x4-day-preflight');
      document.documentElement.style.backgroundColor = '#eae8e3';
      const style = document.createElement('style');
      style.id = 'x4-theme-preflight-style';
      style.textContent = 'html.x4-day-preflight,html.x4-day-preflight body{background:#eae8e3!important;color:#111!important}html.x4-day-preflight body:before{background:#eae8e3!important}';
      document.head.appendChild(style);
      document.addEventListener('DOMContentLoaded', function(){
        document.body.classList.add('x4-day-mode');
      }, {once:true});
    }
    setTimeout(function(){
      document.documentElement.classList.remove('x4-preflight-lock');
      document.getElementById('x4-preflight-lock-style')?.remove();
    }, 900);
  }catch(_){}
})();
</script>

<script id="x4-share-day-theme-script">
(function(){
  function readParams(){
    const raw = location.hash && location.hash.includes('?')
      ? location.hash.slice(location.hash.indexOf('?') + 1)
      : location.search.slice(1);
    return new URLSearchParams(raw);
  }
  function wantedDay(){
    const p = readParams();
    const explicit = p.get('theme');
    if(explicit) return explicit === 'day';
    try{ return localStorage.getItem('x4-dashboard-theme-mode') === 'day'; }catch(_){ return false; }
  }
  function apply(){
    const day = wantedDay();
    document.documentElement.classList.toggle('x4-share-day', day);
    if(document.body) document.body.classList.toggle('x4-share-day', day);
  }
  apply();
  window.addEventListener('hashchange', apply);
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', apply);
})();
</script>

<body>
<main class="shell">
  <div id="x4-share-card" aria-label="X4 分享卡"></div>
  <div class="hint"><span>BOT READY: <code id="readyState">0</code></span><span id="routeText"></span></div>

<script>
(function(){
  const DATA = window.X4_SHARE_DATA || {records:[],meta:{},images:{}};
  const card = document.getElementById('x4-share-card');
  const readyState = document.getElementById('readyState');
  const routeText = document.getElementById('routeText');
  const labels = {ship:'舰船',weapon:'武器',turret:'炮塔',equipment:'装备',sector:'星区',cluster:'星系',map:'星图',lore:'编年史',lore_section:'编年史条目',lore_box:'编年史卡片'};
  function params(){const raw=location.hash&&location.hash.includes('?')?location.hash.slice(location.hash.indexOf('?')+1):location.search.slice(1);return new URLSearchParams(raw)}
  function norm(v){return String(v||'').trim().toLowerCase()}
  function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
  const ZERO_SLOT_FIELDS=new Set(['主武器槽','S 武器槽','M 武器槽','L 武器槽','炮塔槽','S 炮塔槽','M 炮塔槽','L 炮塔槽','护盾槽','S 护盾槽','M 护盾槽','L 护盾槽','XL 护盾槽','引擎槽','XS 停靠/机库','S 停靠/机库','M 停靠/机库','L 停靠/机库','XL 停靠/机库','太空服停靠']);
  const TECH_FIELD_RULES=[/^__/,/macro/i,/ware ID/i,/component 引用/i,/来源文件/,/原始 text 引用/,/生产资源原文/,/完整 ware 标签/,/制造种族原始值/,/名称状态/,/数据状态/,/ware 分组/,/运输类型/];
  const VALUE_TRANSLATIONS={
    license:{capitalship:'主力舰船许可证',generaluseship:'通用舰船许可证',militaryship:'军用舰船许可证',generaluseequipment:'通用装备许可证',militaryequipment:'军用装备许可证',capitalequipment:'主力舰装备许可证',stationmodule:'空间站模块许可证'},
    weaponSystem:{turret_longrange:'远程炮塔系统',turret_midrange:'中程炮塔系统',turret_shortrange:'近程炮塔系统',weapon_standard:'标准武器系统',weapon_mining:'采矿武器系统',missile_dumbfire:'无制导导弹系统',missile_guided:'制导导弹系统',torpedo:'鱼雷系统'}
  };
  const PRODUCTION_METHOD_LABELS={default:'常规生产',terran:'泰伦生产',closedloop:'闭环生产',universal:'通用生产'};
  function zeroLike(v){return /^0(?:\.0+)?$/.test(String(v??'').replace(/,/g,'').trim())}
  function playerPair(pair){const key=String(pair?.[0]??''),value=pair?.[1];if(!key)return false;if(TECH_FIELD_RULES.some(rule=>rule.test(key)))return false;if(value===undefined||value===null||String(value).trim()===''||String(value).trim()==='—')return false;return !(ZERO_SLOT_FIELDS.has(key)&&zeroLike(value))}
  function translateCodeValue(value,dict){return String(value).split(/[,;]\s*/).filter(Boolean).map(part=>dict[part.trim()]||part.trim()).join('、')}
  function formatProductionMethod(value){return String(value).split(/；|;\s*/).filter(Boolean).map(raw=>{const m=raw.trim().match(/^([^:=]+)[:=](\d+(?:\.\d+)?)s(?:\s*x\s*(\d+(?:\.\d+)?))?$/i);if(!m)return raw.trim();return `${PRODUCTION_METHOD_LABELS[m[1]]||m[1]} · ${m[2]} 秒 · 产出 ${m[3]||1}`}).join('；')}
  function displayPair(pair){const key=String(pair?.[0]??''),value=pair?.[1];if(key==='许可证')return [key,translateCodeValue(value,VALUE_TRANSLATIONS.license)];if(key==='武器系统')return [key,translateCodeValue(value,VALUE_TRANSLATIONS.weaponSystem)];if(key==='生产方式')return [key,formatProductionMethod(value)];return [key,value]}
  function sameDisplayValue(a,b){return String(a??'').replace(/\s+/g,'').trim()===String(b??'').replace(/\s+/g,'').trim()}
  function playerPairs(fields){const raw=(fields||[]).filter(playerPair);return raw.filter(pair=>!(pair[0]==='生产资源'&&raw.some(p=>p[0]==='建造材料')&&sameDisplayValue(pair[1],raw.find(p=>p[0]==='建造材料')?.[1]))).map(displayPair)}
  function findRecord(type,id,q){
    const records=DATA.records||[];
    if(type&&id){let hit=records.find(r=>norm(r.type)===norm(type)&&norm(r.id)===norm(id));if(hit)return hit;if(type==='map')return records.find(r=>norm(r.type)==='sector'&&norm(r.id)===norm(id))}
    if(id){let hit=records.find(r=>norm(r.id)===norm(id));if(hit)return hit}
    const query=norm(q||id);
    if(query){let pool=type?records.filter(r=>norm(r.type)===norm(type)||(type==='map'&&norm(r.type)==='sector')):records;return pool.find(r=>norm(r.title)===query||norm(r.english)===query||(r.aliases||[]).some(a=>norm(a)===query))||pool.find(r=>norm(r.searchText).includes(query))}
    return records[0];
  }
  function fitTitle(text){const len=[...String(text||'')].length;if(len>30)return 'style="font-size:36px"';if(len>22)return 'style="font-size:42px"';return ''}
  function tagHtml(record){return (record.tags||[]).filter(Boolean).slice(0,6).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
  function sourceHtml(record){const tags=tagHtml(record);return `<div class="source"><b>来源：</b>${esc(record.source||'X4 星际数据库')}<br><b>边界：</b>静态资料卡，不代表当前存档状态。${tags?`<div class="tags">${tags}</div>`:''}</div>`}
  function itemWideClass(i,total,pair){return total%2===1&&i===total-1&&!['最低价格（Cr）','最高价格（Cr）'].includes(String(pair?.[0]||''))?' wide':''}
  const SHARE_PRIORITY_FIELDS=new Map([['武器系统',1],['许可证',2],['生产方式',3],['建造材料',4],['最低价格（Cr）',5],['最高价格（Cr）',6]]);
  function prioritizePairs(pairs){return pairs.map((pair,i)=>({pair,i,rank:SHARE_PRIORITY_FIELDS.get(pair[0])??50})).sort((a,b)=>a.rank-b.rank||a.i-b.i).map(x=>x.pair)}
  function fieldHtml(fields,max=8){const pairs=playerPairs(fields).slice(0,max);return pairs.map((pair,i)=>`<div class="field${itemWideClass(i,pairs.length,pair)}"><b>${esc(pair[0])}</b><span title="${esc(pair[1])}">${esc(pair[1])}</span></div>`).join('')}
  function lineHtml(fields,max=8){const pairs=prioritizePairs(playerPairs(fields)).slice(0,max);return pairs.map((pair,i)=>`<div class="detail-line${itemWideClass(i,pairs.length,pair)}"><b title="${esc(pair[0])}">${esc(pair[0])}</b><span title="${esc(pair[1])}">${esc(pair[1])}</span></div>`).join('')}
  function detailHtml(record){
    let sections=(record.detailSections||[]).map(s=>({...s,fields:playerPairs(s.fields)})).filter(s=>s.fields.length);
    if(!sections.length&&record.fields?.length)sections=[{title:'核心字段',fields:record.fields}];
    sections=sections.slice(0,4);
    return sections.map((s,i)=>`<section class="detail-section${sections.length%2===1&&i===sections.length-1?' wide':''}"><h3>${esc(s.title)}</h3><div class="detail-lines">${lineHtml(s.fields,8)}</div></section>`).join('');
  }
  function imageFor(record){return record.image||(record.imageKey&&DATA.images?.clusters?.[record.imageKey])||''}
  function mapDot(record){
    const map=record.map||{},x=Number(map.x??map.svgX??840),y=Number(map.y??map.svgY??582),w=Number(map.width||1680),h=Number(map.height||1165);
    const left=Math.max(6,Math.min(94,x/w*100)),top=Math.max(6,Math.min(94,y/h*100));
    return `<div class="map-dot" style="left:${left}%;top:${top}%"></div>`;
  }
  function resources(record){return (record.resources||[]).slice(0,5).map(r=>`<span><b>${esc(r.label||r.ware)}</b><i>${esc(r.yield||r.amount||'—')}</i></span>`).join('')}
  function renderData(record){
    card.className='data-card';
    const sections=(record.detailSections||[]).map(s=>playerPairs(s.fields)).filter(a=>a.length).slice(0,4);
    card.innerHTML=`<div class="card-inner"><section class="data-head"><div class="data-title"><div class="eyebrow"><i></i>${esc(record.label||labels[record.type]||record.type)}</div><h1 ${fitTitle(record.title)}>${esc(record.title)}</h1><div class="subtitle">${esc(record.subtitle||record.english||'')}</div><p class="summary">${esc(record.summary||'该条目来自本地 X4 数据索引。')}</p></div><div class="data-kpis">${fieldHtml(record.fields,6)}</div></section><section class="detail-sections ${sections.length<=3?'compact':''}">${detailHtml(record)}</section>${sourceHtml(record)}</div>`;
  }
  function renderMap(record){
    card.className='map-card';
    const img=imageFor(record);
    const visual=img?`<img src="${esc(img)}" alt="${esc(record.title)}">`:`<div class="map-grid"></div>${mapDot(record)}`;
    const visualClass=img?'map-visual has-image':'map-visual no-image';
    const caption=img?'游戏内星区图片':'星图定位';
    card.innerHTML=`<div class="card-inner"><section class="map-main"><div class="eyebrow"><i></i>${esc(record.label||labels[record.type]||record.type)}</div><h1 ${fitTitle(record.title)}>${esc(record.title)}</h1><div class="subtitle">${esc(record.subtitle||'')}</div><p class="summary">${esc(record.summary||'该条目来自本地 X4 星图索引。')}</p><div class="map-fields">${fieldHtml(record.fields,6)}</div></section><aside class="map-side"><div class="${visualClass}">${visual}<div class="map-caption">${esc(record.title)}<small>${esc(record.clusterTitle||record.subtitle||caption)} · ${caption}</small></div><div class="resource-list">${resources(record)}</div></div>${sourceHtml(record)}</aside></div>`;
  }
  function renderLore(record){
    card.className='lore-card';
    card.innerHTML=`<div class="card-inner"><section class="lore-main"><div class="eyebrow"><i></i>${esc(record.label||labels[record.type]||record.type)}</div><h1 ${fitTitle(record.title)}>${esc(record.title)}</h1><div class="subtitle">${esc(record.subtitle||'')}</div><p class="summary">${esc(record.summary||'该条目来自本地 X4 编年史索引。')}</p><div class="lore-fields">${fieldHtml(record.fields,4)}</div></section><aside class="map-side"><div class="lore-visual"><div class="orb"></div><div class="big-code">${esc((record.type||'LOR').slice(0,3).toUpperCase())}</div></div>${sourceHtml(record)}</aside></div>`;
  }
  function render(record){
    const p=params(),layout=p.get('size')||p.get('layout')||'';
    document.body.classList.toggle('portrait',layout==='portrait');card.classList.toggle('portrait',layout==='portrait');
    if(!record){card.className='notfound';card.innerHTML=`<div class="card-inner"><div><div class="eyebrow"><i></i>NOT FOUND</div><h1>未找到分享条目</h1><p class="summary">请检查 type 与 id，或改用 q 参数让页面做一次本地索引搜索。</p></div></div>`;return}
    if(['ship','weapon','turret','equipment'].includes(record.type))return renderData(record);
    if(['sector','map','cluster'].includes(record.type))return renderMap(record);
    return renderLore(record);
  }
  function exportText(record){
    if(!record)return '未找到分享条目';
    const lines=[`【${record.label||labels[record.type]||record.type}】${record.title}`,record.subtitle||'',record.summary||''];
    const pairs=playerPairs((record.allFields&&record.allFields.length?record.allFields:record.fields)||[]);
    pairs.slice(0,24).forEach(pair=>lines.push(`${pair[0]}：${pair[1]}`));
    lines.push(`来源：${record.source||'X4 星际数据库'}`);lines.push('边界：静态资料卡，不代表当前存档状态。');
    return lines.filter(Boolean).join('\n');
  }
  function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines){
    const chars=[...String(text||'')];let line='',lines=[];
    for(const ch of chars){const test=line+ch;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=ch;if(lines.length>=maxLines)break}else line=test}
    if(lines.length<maxLines&&line)lines.push(line);
    lines.slice(0,maxLines).forEach((ln,i)=>ctx.fillText(ln,x,y+i*lineHeight));
  }
  let currentRecord=null;
  function exportPng(record){
    record=record||currentRecord;
    const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=675;
    const ctx=canvas.getContext('2d'),grad=ctx.createLinearGradient(0,0,1200,675);
    grad.addColorStop(0,'#07111b');grad.addColorStop(.56,'#0b1723');grad.addColorStop(1,'#050a12');ctx.fillStyle=grad;ctx.fillRect(0,0,1200,675);
    ctx.strokeStyle='rgba(126,158,183,.5)';ctx.lineWidth=2;ctx.strokeRect(1,1,1198,673);
    ctx.fillStyle='#5fe1ff';ctx.font='800 18px Microsoft YaHei UI, sans-serif';ctx.fillText(record?.label||labels[record?.type]||record?.type||'X4',46,64);
    ctx.fillStyle='#f7fbff';ctx.font='700 52px Microsoft YaHei UI, sans-serif';wrapCanvasText(ctx,record?.title||'未找到分享条目',46,134,760,60,2);
    ctx.fillStyle='#aec4d1';ctx.font='24px Microsoft YaHei UI, sans-serif';wrapCanvasText(ctx,record?.subtitle||'',46,260,760,32,2);
    ctx.fillStyle='#d7e6ee';ctx.font='21px Microsoft YaHei UI, sans-serif';wrapCanvasText(ctx,record?.summary||'该条目来自本地 X4 数据索引。',46,346,760,34,4);
    const pairs=playerPairs((record?.allFields&&record.allFields.length?record.allFields:record?.fields)||[]);
    ctx.fillStyle='rgba(3,10,17,.68)';ctx.fillRect(46,528,760,94);ctx.strokeStyle='rgba(126,158,183,.25)';ctx.strokeRect(46,528,760,94);
    ctx.fillStyle='#91a8b7';ctx.font='17px Microsoft YaHei UI, sans-serif';wrapCanvasText(ctx,pairs.slice(0,6).map(p=>`${p[0]}：${p[1]}`).join('  /  '),66,565,720,26,2);
    ctx.fillStyle='rgba(95,225,255,.12)';ctx.beginPath();ctx.arc(1000,310,170,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(95,225,255,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(1000,310,130,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(95,225,255,.22)';ctx.font='900 76px Consolas, monospace';ctx.fillText((record?.type||'X4').slice(0,3).toUpperCase(),905,335);
    return canvas.toDataURL('image/png');
  }
  function updateRoute(){
    window.X4ShareReady=false;document.body.dataset.shareReady='0';readyState.textContent='0';
    const p=params();
    currentRecord=findRecord(p.get('type'),p.get('id'),p.get('q'));
    render(currentRecord);
    routeText.textContent=location.hash||location.search||'#/share';
    window.X4Share={data:DATA,record:currentRecord,findRecord,exportText:()=>exportText(currentRecord),exportPng};
    window.X4ShareReady=true;document.body.dataset.shareReady='1';readyState.textContent='1';
  }
  window.addEventListener('hashchange',updateRoute);
  updateRoute();
})();
</script>
</body>
